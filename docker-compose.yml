services:
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro-tts
    # Loopback only — kokoro is the internal TTS engine, reached by
    # speak-server over the compose network. The port is published solely for
    # local debugging / listing voices; nothing external needs it.
    ports:
      - "127.0.0.1:8880:8880"
    restart: always

  supertonic:
    build: ./supertonic
    container_name: supertonic-tts
    # Opt-in: most setups want just one engine, and kokoro is the default.
    # Enable with COMPOSE_PROFILES=supertonic in .env (see README).
    profiles: ["supertonic"]
    # Loopback only, same reasoning as kokoro. Published for local debugging
    # (e.g. GET /v1/styles); speak-server reaches it over the compose network.
    ports:
      - "127.0.0.1:7788:7788"
    # Model assets live in the repo (git-ignored, ~400 MB) so the stack is
    # self-contained; the image stays model-free and nothing is fetched at
    # startup. Read-only: the container must never mutate the checked-out
    # copy. See README for seeding a fresh clone.
    volumes:
      - ${SUPERTONIC_MODEL_DIR:-./supertonic/models/supertonic-3}:/models:ro
    restart: always

  speak-server:
    build: ./speak-server
    container_name: speak-server
    # Published on all interfaces so tools on other machines (the whole point)
    # can POST text and have it spoken here. There is NO auth — run it on a
    # trusted LAN, or restrict access with your firewall. See README.
    ports:
      - "8899:8899"
    # Plays through the host's Pulse/PipeWire session: uid must match the
    # desktop user. UID/GID default to 1000 — export them (or set in .env)
    # if yours differ; PULSE_SERVER below must embed the same uid.
    #
    # /run/user (not /run/user/<uid>/pulse) is mounted with rslave
    # propagation because the per-user tmpfs at /run/user/<uid> is only
    # mounted by logind at login — binding anything under it at boot (this
    # container autostarts before login) captures a stale placeholder dir.
    # With rslave, the login-time tmpfs mount propagates into the container.
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      PULSE_SERVER: unix:/run/host-user/${UID:-1000}/pulse/native
      PULSE_COOKIE: /run/pulse-cookie
      KOKORO_URL: http://kokoro:8880
      SUPERTONIC_URL: http://supertonic:7788
      # Engine used when a request doesn't name one, and each engine's
      # default voice — override in .env.
      ENGINE: ${ENGINE:-kokoro}
      VOICE: ${VOICE:-af_heart}
      SUPERTONIC_VOICE: ${SUPERTONIC_VOICE:-M1}
    volumes:
      - type: bind
        source: /run/user
        target: /run/host-user
        read_only: true
        bind:
          propagation: rslave
      - ~/.config/pulse/cookie:/run/pulse-cookie:ro
    # No depends_on for supertonic: depending on a profile-gated service
    # would make the default (profile-less) `up` fail. Startup order barely
    # matters anyway — an engine that isn't up yet just returns a 502.
    depends_on:
      - kokoro
    restart: always
